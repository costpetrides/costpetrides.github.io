<!DOCTYPE html>
<html>
<head>
<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open Sans">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
h1,h2,h3,h4,h5,h6 {font-family: "Oswald"}
body {font-family: "Open Sans"}

.hero-imagetitle{
  background-image: url("IMG_1314.svg");
  height: 100%;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  position: relative;
}

.hero-texttitle {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
}  
  
</style>
</head>
<body class="w3-light-grey">

<!-- Navigation bar with social media icons -->
<div class="w3-bar w3-black w3-hide-small">
  <a href="#" class="w3-bar-item w3-button"><i class="fa fa-facebook-official"></i></a>
  <a href="#" class="w3-bar-item w3-button"><i class="fa fa-instagram"></i></a>
  <a href="#" class="w3-bar-item w3-button"><i class="fa fa-snapchat"></i></a>
  <a href="#" class="w3-bar-item w3-button"><i class="fa fa-flickr"></i></a>
  <a href="#" class="w3-bar-item w3-button"><i class="fa fa-twitter"></i></a>
  <a href="#" class="w3-bar-item w3-button"><i class="fa fa-linkedin"></i></a>
</div>
  
<!-- w3-content defines a container for fixed size centered content, 
and is wrapped around the whole page content, except for the footer in this example -->
<div class="w3-content" style="max-width:1600px">

  
<div class="hero-image">
  <div class="hero-text">
    <h1 style="font-size:30px">	Constantinos Petrides</h1>
    <p> Physicist at NKUA </p>
    <p><a href='https://github.com/costpetrides'><img src='https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg' style="width:30px;height:30px;"></a> <a href='https://www.linkedin.com/in/constantinos-petrides-4366b7133'><img src='https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg' style="width:30px;height:30px;"></a> <a href='https://en.phys.uoa.gr'><img src='https://upload.wikimedia.org/wikipedia/en/thumb/a/ab/National_and_Kapodistrian_University_of_Athens_logo.svg/1024px-National_and_Kapodistrian_University_of_Athens_logo.svg.png' style="width:30px;height:30px;"></a>  <a href='https://storiesbyheroes.com'><img  src='IMG_1314.svg' style="width:30px;height:30px;"></a></p>
    <button onclick="window.location.href='CV.pdf';">Curriculum Vitae</button>
  </div>
</div>

 


<script>
// Toggle between hiding and showing blog replies/comments
document.getElementById("myBtn").click();
function myFunction(id) {
  var x = document.getElementById(id);
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else { 
    x.className = x.className.replace(" w3-show", "");
  }
}

function likeFunction(x) {
  x.style.fontWeight = "bold";
  x.innerHTML = "✓ Liked";
}
</script>

</body>
</html>
